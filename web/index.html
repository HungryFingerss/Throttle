<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Throttle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <span class="dot" id="conn-dot"></span>
      <h1>Throttle</h1>
      <span class="tag">local control layer</span>
    </div>
    <div class="totals">
      <div class="cap-control">
        <label>Daily $ cap</label>
        <input type="number" id="day-cap" min="0" step="0.5" placeholder="none" />
        <button id="set-day-cap">Set</button>
        <span id="cap-status" class="cap-status"></span>
      </div>
      <div class="stat"><span class="num" id="total-cost">$0.00</span><span class="lbl">spend today (API)</span></div>
      <div class="stat"><span class="num" id="active-count">0</span><span class="lbl">active sessions</span></div>
    </div>
  </header>

  <section class="rules-bar">
    <label for="rules-text">Global rules — one per line, injected every turn and re-injected after compaction</label>
    <div class="rules-row">
      <textarea id="rules-text" rows="2" placeholder="e.g. Never force-push to main&#10;Run the tests before saying done"></textarea>
      <button id="save-rules">Save rules</button>
      <span id="rules-status" class="cap-status"></span>
    </div>
  </section>

  <main>
    <table id="sessions">
      <thead>
        <tr>
          <th>Tool</th>
          <th>Project</th>
          <th>Model</th>
          <th>Mode</th>
          <th class="r">In</th>
          <th class="r">Out</th>
          <th class="r">Cache</th>
          <th class="r">Tokens</th>
          <th class="r">Cost / Quota</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <p id="empty" class="empty">No sessions yet. Start an agent (Claude Code, Codex, …) and it appears here instantly.</p>
  </main>

  <footer class="feedback">
    <button id="fb-toggle" class="fb-toggle">💬  Feedback / suggestion</button>
    <div id="fb-panel" class="fb-panel" hidden>
      <textarea id="fb-text" rows="3" placeholder="What's working? What's missing? What would you change? — sent straight to the Throttle maker."></textarea>
      <div class="fb-row">
        <input id="fb-email" type="email" placeholder="your email (optional — so we can reply)" />
        <button id="fb-send">Send</button>
        <span id="fb-status" class="fb-status"></span>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
